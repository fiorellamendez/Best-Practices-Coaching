<script type="text/babel" data-presets="react">
const { useState, Fragment } = React;

const PRINCIPLES = [
  {
    id: 1, number: "01",
    title: "Coaching Is Not Tutoring",
    tagline: `Your job is to find the smallest push that lets the student move forward — not to re-teach the lesson.`,
    blocks: [
      { t: "p", text: `This is the most important thing to understand, and the hardest habit to build. When a student is stuck, every instinct says: explain it. Resist that instinct. The app already taught the lesson. Your job is to find where the student's thinking broke down, and apply just enough pressure at that point to get them moving again.` },
      { t: "q", text: `Effective coaching is not about giving students the answer. It is about identifying the root cause of their misunderstanding and giving just enough support for them to correct it independently.` },
      { t: "q", text: `Most students need just a small push in the right direction. Keeping our eyes open to pinpoint exactly where to push is more valuable than running through the entire lesson again — the app already did that.` },
      { t: "p", text: `In practice, this means asking a question instead of making a statement. It means waiting after you ask. It means letting a student sit with a wrong answer for a moment before intervening. It feels uncomfortable at first, especially when you know the answer and they don't. But in the discomfort of not knowing, and then figuring it out, is where learning happens.` },
      { t: "q", text: `A student who got it wrong five or six times and then gets it right once learned more than the student who got it right on the first try. The struggle IS the learning — my job isn't to prevent mistakes, it's to make sure each mistake moves them forward.` },
      { t: "q", text: `There are ALWAYS guiding questions that can be asked without revealing the answer. If you can't figure them out, Chat GPT can.` },
      { t: "h", text: `The line between coaching and tutoring` },
      { t: "p", text: `The line is not always obvious, and several coaches acknowledge crossing it occasionally — particularly when a student is genuinely frustrated or has a large prerequisite gap. A brief, targeted explanation is sometimes the right call. But it should be a deliberate choice, not the default. Ask yourself: am I doing cognitive work the student could do with a nudge?` },
    ],
  },
  {
    id: 2, number: "02",
    title: "The Relationship Comes First",
    tagline: `A student who feels seen and safe will do more than a student who is simply managed.`,
    blocks: [
      { t: "p", text: `Coaching thirty different students a week, thirty minutes at a time, is a relationship challenge as much as a pedagogical one. Every call is a cold start with someone you may barely know. The coaches on this team who are most effective at unlocking students in difficult moments — distracted, frustrated, resistant — do it through relationship.` },
      { t: "q", text: `I wish I knew how difficult it is to establish a rapport with dozens of different kids weekly, half an hour at a time, and how important it is to do that from the first contact you make with a specific kid.` },
      { t: "q", text: `Being warm and friendly works well in creating a safe space where students can confidently express their doubts and insecurities. Humor is always welcome.` },
      { t: "p", text: `This doesn't mean the session has no structure. It means warmth and structure are not opposites. The coaches who are getting the best results consistently describe balancing both - keeping a friendly tone while still covering what needs to be covered.` },
      { t: "q", text: `Kids are still kids, and the balance between the structure of the call and the real interaction is vital. I have had a hard time trying to keep a warm tone while also covering all the structure we need to cover.` },
      { t: "h", text: `Rapport takes time, and it pays off` },
      { t: "p", text: `Brief personal detours — a student mentions their dog and you ask about it for thirty seconds — are not wasted time. They are how you build the credit that lets you redirect a student when things get hard. Coaches who try to maintain strict academic focus from the first second often find they have less influence when they need it most.` },
      { t: "q", text: `Indulge kids when they are trying to share something that's interesting to them, even though it is a distraction — but make sure it is brief. This helps in building rapport and boosting their morale if managed properly.` },
      { t: "q", text: `Patience and kindness are very important. Students will sometimes try to get a reaction out of you, but once they realise you are consistent, calm, and still gentle, it usually helps a lot.` },
    ],
  },
  {
    id: 3, number: "03",
    title: "Work With What Students Actually Care About",
    tagline: `Most students care about XP, not learning — and that's your starting point, not an obstacle.`,
    blocks: [
      { t: "p", text: `This is one of the most consistent things coaches say, and one of the most important to accept without judgement. The majority of students are motivated by XP, ring-closing, and finishing — not by the intrinsic value of learning to identify prepositional phrases. Fighting that reality wastes time. Working with it is one of the most effective tools you have.` },
      { t: "q", text: `That most students are more concerned about XP than they are about learning the concept.` },
      { t: "q", text: `How little a lot of students actually care about learning other than closing their rings for the day.` },
      { t: "p", text: `This doesn't mean abandoning the goal of real understanding. It means finding the path from what the student cares about to what you need them to do. Slow down to earn more XP. Accuracy is what the ring measures, not speed. If you master this now, you won't get it reassigned.` },
      { t: "q", text: `Can we get this done quickly while earning some XP so we can move on?` },
      { t: "q", text: `Show them that slowing down will actually earn more XP most of the time. Some students are responsive to 'learn' rather than 'earn' — not many, though.` },
      { t: "h", text: `When you find a student who does care about learning` },
      { t: "p", text: `Some students are genuinely motivated by understanding. When you find one, lean into it — but don't assume it. And don't shame the students who aren't. XP motivation is not a character flaw; it's a reasonable response to the system they're in.` },
    ],
  },
  {
    id: 4, number: "04",
    title: "80% of This Job Is Motivation and Confidence",
    tagline: `Most students already have more understanding than they show — your job is often to unlock what's already there.`,
    blocks: [
      { t: "p", text: `The students who seem most stuck are often not missing knowledge — they're missing confidence. They've decided they can't do this, or that trying is risky, or that getting it wrong again isn't worth the effort. What looks like a comprehension problem is often an emotional one.` },
      { t: "q", text: `80% is motivational and confidence building.` },
      { t: "q", text: `Students often understand more than it first seems. Many times, they are only missing one small step, a key detail, or the confidence to try independently.` },
      { t: "q", text: `Asking follow-up questions and understanding their thinking is super important — you'll often find the understanding is closer to the surface than it looked.` },
      { t: "p", text: `This shapes everything: how you respond to a wrong answer (not as a failure, but as information), how you frame a stuck moment (not as inability, but as not-yet), and how you close a session (not just with content recap, but with evidence of what the student proved they could do).` },
      { t: "q", text: `Learning is a process, and we work with many different students with different personalities — it's our job to adapt to them.` },
      { t: "h", text: `What this looks like in practice` },
      { t: "ul", items: [
        `Name what the student got right before addressing what they got wrong.`,
        `Reframe "I can't" as "not yet" — it's a small shift that changes the student's relationship to the task.`,
        `Let them finish something independently before the session ends, so they leave with evidence of their own capability.`,
        `Close by asking what they learned — not telling them. The student naming their own progress consolidates it.`,
      ] },
    ],
  },
  {
    id: 5, number: "05",
    title: "Know Your Apps — Confidence Is Contagious",
    tagline: `A coach who knows the app can focus on the student; a coach who doesn't is managing two problems at once.`,
    blocks: [
      { t: "p", text: `App familiarity came up more than any other topic in the 'what I wish I'd known' responses. Coaches with experience on a given app can anticipate where students get stuck, know which in-app resources to point to, and project calm when something goes wrong. Coaches who don't know the app are managing their own uncertainty while also trying to coach — and students can feel that.` },
      { t: "q", text: `I wish I had known about all the new apps and resources we would add to the coaching profile. There are always new ones being added.` },
      { t: "q", text: `New coaches need more time to familiarize themselves with the different apps so they can navigate them with confidence — and transmit that confidence to students.` },
      { t: "q", text: `I had a hard time with Math Cakes in one call where the student was frustrated due to the app design and we had to figure it out together, instead of me knowing what was going on.` },
      { t: "h", text: `What to do about it` },
      { t: "ul", items: [
        `Prioritize learning the apps you see most frequently. Focus depth on your most common ones.`,
        `Go through the courses yourself for apps you coach frequently but aren't familiar with. Subject knowledge helps you ask better guiding questions.`,
        `Preparation beats experience. If possible, even 5 minutes reviewing what a student is working on before a call changes the quality of your questions.`,
      ] },
      { t: "q", text: `Being familiar with the subject material really helps with asking the right guiding questions and pushing the student in the right cognitive direction. I encourage all coaches to go through courses they're not familiar with to build subject foundations.` },
      { t: "note", text: `*An app quick-reference guidebook coming soon!` },
    ],
  },
];

const SCENARIOS = [
  {
    id: 1, number: "1",
    title: "Student Is Disengaged or Distracted",
    situation: `The student is physically present but mentally elsewhere — watching themselves in the camera, talking about something unrelated, spacing out during a lesson video, or responding to noise in their environment. Attention has drifted before any academic struggle has started.`,
    good: [
      { bullet: `Name the specific behavior and redirect to a concrete action. Don't ask "are you paying attention?" That question puts students on the defensive. Instead, give them something to do right now.`, quotes: [`"I'm going to need your help with something — can you read that problem back to me?" That simple redirect brought them back immediately.`, `"Can you click the audio button to hear the question?"`] },
      { bullet: `Diagnose why they're disengaged before redirecting. The approach differs: noisy surroundings need a practical fix (quieter spot, turning away from distractions); boredom during a video needs active engagement (take notes, then review together); tiredness needs a brief reset.`, quotes: [] },
      { bullet: `Make a brief personal connection, then return to the work. A short detour - acknowledging what the student said, asking about something you know they care about - often restores more engagement than a direct redirect.`, quotes: [`"Wow, that's interesting. How about we look at this next problem? This one actually seems pretty cool — what do you think?"`, `"Are you surfing today?" [student answers] "That's great — now let's focus on this part because understanding it now will make the next lessons easier."`] },
      { bullet: `Praise what they already know, then bridge to the new skill. Some students disengage because they can't connect prior knowledge to what the lesson is asking. Naming what they do know, and building from it, re-anchors them.`, quotes: [`"Hey, what's one thing you remember from last time?" — it shifts them from passive to active without putting them on the spot.`] },
      { bullet: `Use time and goals as a light motivator. Reminding students how much time is left and what they set out to achieve can create enough structure to re-engage, especially for XP-motivated students.`, quotes: [`"We have X minutes — the better we focus, the sooner we master the lesson and get that XP."`] },
    ],
    sample: [`"Can you read that question back to me?"`, `"We only have X minutes — let's make them count. What's the first thing this question is asking?"`, `"I know this might feel [boring/hard/slow] right now — let's work through it together and get it done."`],
    redflags: [`When distraction is a pattern across sessions – fill in the DS form appropriately and flag to the campus DRI`, `When the student is in a genuinely noisy or chaotic environment and can't focus nor change location - suggest rescheduling and inform the guide.`, `When the student seems genuinely tired, unwell, or emotionally off - a brief check-in is fine: ask for the guide and don't force the lesson if the student is unwell.`],
  },
  {
    id: 2, number: "2",
    title: "App Has No Built-In Tutorial or Support",
    situation: `The student is stuck and the app can't help — no tutorial, no hint, no worked example. You can't point them to the lesson video or the app's own explanation. You have to be the scaffold, without becoming the teacher.`,
    good: [
      { bullet: `Check prerequisites first. Before trying to guide the student through the question, find out whether they have the foundation needed. If the gap is too large, address the prerequisite — not the question itself.`, quotes: [`"I first check if the student knows the fundamentals of the skill at hand. If the knowledge is there I use it to build upon — for example, working on areas of compound shapes: I first make sure they know the area of a rectangle, then how to split compound figures into rectangles."`, `"If the gap is too big, I'm honest: I tell them I'll assign a prerequisite skill and they must complete it before taking the current lesson. Then I inform the subject DRI."`] },
      { bullet: `Ask questions in sequence, not just one guiding question. A single question rarely unlocks a stuck student. Sequence your questions so each one builds on the last, guiding the student to synthesize the knowledge themselves.`, quotes: [`"What do you already know about this topic?" → "Can you explain the question back to me in your own words?" → "If you had to guess, what do you think the answer might be?"`, `"Let's figure this out together — what do you already know about this topic?" Then I use decomposition to break the problem into smaller steps and ask them to reason through each one. I try to make it feel like we're exploring rather than me teaching.`] },
      { bullet: `Read the question slowly together, highlighting key details. Many students who appear stuck haven't actually read the question carefully. Slow, deliberate reading — done together — often reveals what the student already knows.`, quotes: [`"First, I read the question slowly with the student, highlighting every important detail. Then I ask: what do you think this question is about, and what do you remember about that topic?"`] },
      { bullet: `Build a heuristic the student can take with them. When the app provides no rule or test, invent one on the spot that's simple enough for the student to recall and use independently next time.`, quotes: [`"In a session on transitive vs. intransitive verbs with no scaffold, I introduced a 'cover up everything after the verb' test — if the sentence still works, the verb is intransitive; if it doesn't, it needs an object. The student articulated it back at the end of the session."`] },
      { bullet: `Use a relatable real-life example if the concept isn't landing.`, quotes: [`"Give another relatable example not in the content, and try to work through that first — OR connect with real-life examples."`] },
      { bullet: `A brief explanation is sometimes necessary — but flag it to yourself. A short, direct explanation is occasionally the right call. It crosses into tutoring territory, so use it sparingly and as a last resort. Before going there, ask yourself: is there a question I could ask that would get the student to the same place? (See Principle 1 — Coaching Is Not Tutoring.)`, quotes: [`"If all else fails, I do a brief explanation of the topic — not ideal, because I realise this constitutes tutoring. But I won't let a student sit completely stuck."`] },
      { bullet: `Loop in the subject DRI if the app content is genuinely broken or misassigned. Sometimes the issue isn't the student — it's the lesson itself. Flag it after the call.`, quotes: [] },
    ],
    sample: [`"What do you already know about this topic? Let's start there."`, `"Let's read this question together slowly — what do you notice?"`, `"Let's figure this out together — I'll ask you questions and you tell me what you think."`],
    redflags: [`When the student has a significant prerequisite gap, don't try to bridge it in one call. Fill in the DS form appropriately and inform the campus DRI so the content can be reviewed.`, `When the lesson itself appears to be misconfigured or misassigned flag to the subject DRI and campus DRI after the call.`, `When you're doing most of the cognitive work; if you're solving it and the student is watching, stop and reset. Ask a question instead.`],
  },
  {
    id: 3, number: "3",
    title: "Student Is Visibly Frustrated (About to Give Up)",
    situation: `The student is clearly upset — tearing up, snapping back, saying "I can't do this," or going silent. They're not just stuck; they're emotionally done. Pushing through work right now will make things worse.`,
    good: [
      { bullet: `Acknowledge the feeling first — don't rush past it. Name what you see before doing anything else. The goal is for the student to feel heard, not fixed.`, quotes: [`"I see you are frustrated. I understand you feel like you can't do this. Breathe — take a second, and we'll come back to it."`, `"I understand you're frustrated — I would be too."`] },
      { bullet: `Help students find words for what they feel when they can't articulate it themselves. Offer language: "Is it that the question keeps changing on you?" or "Is it that you've been at this a while and you're tired of it?"`, quotes: [] },
      { bullet: `Create space — don't force forward momentum. Offer a break. Stop screen sharing and just talk. Some students need water or a stretch. The session does not have to keep moving.`, quotes: [`"This is the hardest lesson in AlphaWrite. You're doing a great job so far. Why don't we take it one step at a time?"`] },
      { bullet: `Rebuild confidence with a small win. Point to something the student already understood to get to this point. Offer one completable task before returning to the hard part.`, quotes: [`"I try to point out everything they were able to understand and master to get to this point — that alone is real progress."`, `"That frustration means you're actually trying. Let's find one small thing we can finish together right now."`] },
      { bullet: `Never say "Yes, you can do it" or "Come on, let's continue." These dismiss the feeling. Match the student's emotional state before asking them to shift it. This is about hollow reassurance — not specific, earned encouragement. "You already got through the hardest part" is fine; "Yes, you can do it" when they're in tears is not.`, quotes: [] },
    ],
    sample: [`"I hear you — that was a tough one. Let's just take a breath first."`, `"What part felt the most frustrating? Let's look at just that piece."`, `"You already got through [X] — that was the harder part. This next step is smaller."`],
    redflags: [`Recurring frustration across sessions may signal a placement or content issue. Inform the subject DRI and campus DRI.`, `When the student is genuinely struggling to understand content, inform the campus DRI to review placement.`, `When the emotional response feels bigger than the schoolwork, don't push academic content. Acknowledge, close warmly, and flag the campus DRI.`],
  },
  {
    id: 4, number: "4",
    title: "Student Rushes Through Without Really Learning",
    situation: `The student is flying through work to rack up XP or finish fast, skipping instructional content, clicking through explanations, or submitting answers without reading the question. Speed is getting in the way of understanding.`,
    good: [
      { bullet: `First, check whether speed is actually a problem. Some students are genuinely fast and accurate. Only slow them down when speed is causing errors or when they're skipping instruction they need.`, quotes: [`"If their accuracy is high when speeding, I do not slow them down. If speeding is affecting their accuracy, I let them know it's important to review explanations after every missed question."`] },
      { bullet: `Ask them to explain their answer before submitting. "What is leading you to this answer?" or "How did you get this?" naturally slows the student without lecturing and surfaces misunderstanding.`, quotes: [`"Having them explain their answer before submitting automatically slows them down."`, `"Nice, you're moving fast — now explain that last one back to me." If they can't: "Let's go back and actually own that one before we move on."`] },
      { bullet: `Make sure strategies and process are clear before the student submits. Build the habit of checking understanding first. When a student has worked through the steps discussed, give them an explicit green light.`, quotes: [`"When you've done everything we've mentioned and are confident that's the right answer, go ahead and submit."`] },
      { bullet: `Ask the student to read the problem aloud before answering. It slows the pace, forces engagement with the question, and surfaces misreading.`, quotes: [`"Can you read that question to me before you answer?"`] },
      { bullet: `Connect slowing down to what the student actually cares about. For XP-motivated students, show them that accurate earns more XP than fast and wrong. For mastery-focused students, connect rushing to the risk of reassignment. Note: only use these when speed is genuinely causing errors — don't apply them to students who are fast and accurate (see first point above).`, quotes: [`"Slow down to speed up" and "slow is smooth, smooth is fast" — kids understand that taking an extra minute to get it right is faster than missing something and having to redo the exercise.`, `"Rushing is one of the main reasons students fail tests — when you rush, you don't really learn anything."`] },
      { bullet: `Use a concrete analogy if the message isn't landing.`, quotes: [`"Do you know the story of the tortoise and the hare? The moral lands naturally. Then I connect it to their own data — rushing might feel productive, but their scores tell a different story."`] },
    ],
    sample: [`"Before you submit — walk me through how you got that answer."`, `"When you've checked your work and you're confident, go ahead and submit."`, `"Can you read that question out loud first?"`, `"Remember: accuracy is what earns XP, not speed."`],
    redflags: [`Student is rushing because the content is too easy — this is a placement issue, not a rushing problem. Flag to the campus DRI.`, `Student has memorized answers from repeated attempts and is not engaging with content — inform the subject DRI and campus DRI.`, `Rushing is paired with visible anxiety (finishing fast to get off the call) — treat as a motivation or engagement issue first.`],
  },
  {
    id: 5, number: "5",
    title: `Student "Gets It" In the Moment but Can't Demonstrate Mastery`,
    situation: `The student clearly understands the concept while you're working together — they answer correctly, follow along, nod — but when asked to work independently, they can't reproduce it. Understanding with support is not the same as independent mastery.`,
    good: [
      { bullet: `Step back and let the student work independently before the session ends. As the session closes, go quiet. Let the student complete the final problems without coaching. This gives a real signal of what they can actually do alone.`, quotes: [`"I let the student complete the final part of the lesson independently while I stay silent unless they truly need support. At the end I reflect back: 'You completed that by yourself.'"`] },
      { bullet: `Close with a retrieval check, not just a summary. Ask the student to produce something — explain a concept, name steps, answer a new question of the same type — rather than nodding at a recap.`, quotes: [`"I ask the student to explain the concept step by step, as if they are teaching it to me. I also ask them to give an example for each step."`, `"Before ending the session I include one final retrieval attempt with little or no help to get a more honest signal of what the student can actually do on their own."`] },
      { bullet: `Name what's real and what's still a gap — specifically. Don't leave with a vague "keep practising." Tell the student exactly what they demonstrated, what the remaining gap is, and what the next step looks like.`, quotes: [`"The understanding is real — the gap is mapping your reasoning to the label names. Your next step is to check the lesson rules before selecting when you're unsure, which you already started doing."`] },
      { bullet: `Use a fill-in-the-blank process recap for procedural skills.`, quotes: [`"Today we focused on [topic]. When we see a question like [X], what's the first thing we need to do? What then?" — keep prompting until you've run through the whole process together.`] },
      { bullet: `Loop in the campus DRI so practice continues after the call. One coaching call is not enough. Fill out corresponding DS correctly so cDRI and guides can get feedback.`, quotes: [`"I reach out to guides with feedback to keep them in the loop. If possible, I check how the student finished the lesson and write them a quick note — congratulatory or a reminder — with the guide's approval."`] },
    ],
    sample: [`"You clearly get this — you explained it perfectly. Now the goal for next session is to do it on your own, without me."`, `"Walk me through it one more time, from the start, without any help from me."`, `"I noticed you really understood [X] today. The part that still needs practice is [Y]."`],
    redflags: [`Student can't demonstrate understanding even with support — notify the campus DRI`, `Pattern repeats across multiple sessions — flag to the campus DRI; this may need a different kind of support.`, `Student is guessing in the moment, not understanding — watch for answers that arrive too quickly or without reasoning.`],
  },
  {
    id: 6, number: "6",
    title: "Tech Issues (Mic, Screen Share, App Crash)",
    situation: `Something breaks mid-session — the student's mic cuts out, screen share drops, the app crashes, or the connection freezes. How you handle the situation determines whether the session recovers.`,
    good: [
      { bullet: `Stay calm and narrate what you're doing. Students take their cue from you. If you're flustered, they disengage. If you're matter-of-fact, they wait.`, quotes: [`"Okay, the screen share just dropped — give me 20 seconds." Narrating keeps the student informed and calm.`, `"I keep talking through the process: 'Ok, hang on, I'm going to try unplugging and replugging my headphones' — so the student knows I'm here and trying."`] },
      { bullet: `Keep the student doing something while you troubleshoot. Don't let silence kill the momentum. Give a think-aloud task so the session keeps moving even while you fix the issue.`, quotes: [`"While I sort this, can you re-read the last question and tell me what it's really asking?" That keeps them mentally active.`, `"The main thing is never to let the silence kill the momentum — I switch channels when possible. I hop to chat and send them a message that I can still see them and they can keep working."`] },
      { bullet: `Get them back to a working screen first — explain later. Don't spend time diagnosing why something broke. Focus on getting the student back to being able to work.`, quotes: [`"Get them back to a working screen first, explain later — or never, if it doesn't matter."`] },
      { bullet: `Follow a quick troubleshooting sequence for audio issues:`, sublist: [`Check volume is turned up (most common issue)`, `Check headphones are plugged in all the way`, `Check the student didn't accidentally press the M key (mute)`, `Message via Google Chat if they can't hear you`, `Ask them to leave and rejoin the call (solves ~95% of remaining issues)`, `Walk them through Google Meet settings → test mic → clear cache → rejoin`], quotes: [] },
      { bullet: `Keep it light if you can. A bit of humor defuses the awkwardness and keeps the student engaged.`, quotes: [`"Wow, we were working so hard the app gave up on us!" — then reopen it together.`, `"Today a student's microphone suddenly turned off mid-session. She could still hear me, so we made a game out of it — she used hand gestures as we worked through the problem."`] },
      { bullet: `Escalate to the guide for anything you can't fix in 1–2 minutes. Especially for younger students who can't troubleshoot themselves.`, quotes: [`"I ask them to call their guide for help — that is the quickest solve, because we cannot see what is going on on their end at all."`, `"If it's a young student I directly ask them to get their guide. An older student can try to solve the issue with my direction. Either it has an easy fix, we pivot, or they ask a guide for help."`] },
    ],
    sample: [`"Hang on — give me 20 seconds to sort this. While I do, can you re-read that last question?"`, `"It looks like your mic is off — can you check if your headphones are plugged in all the way?"`, `"Let's ask your guide to help — they'll be faster at fixing this than we will."`],
    redflags: [`Tech issues happen repeatedly with the same student — flag to the guide if available or campus DRI after the call; there may be an equipment or connectivity issue.`, `App appears to have a genuine bug — flag to the subject DRI after the call so it can be reported.`, `If part of the session was lost due to troubleshooting and that impeded finishing the lesson, offer to schedule another call at the student's convenience.`],
  },
  {
    id: 7, number: "7",
    title: "Student Pushes Back or Refuses to Try",
    situation: `The student flat-out refuses — "I don't want to," "this is boring," "I can't do this" — or they simply go silent and stop engaging. This is different from frustration: the student isn't upset, they're resisting. Arguing or pressuring almost always makes it worse.`,
    good: [
      { bullet: `Don't argue. Get curious instead. In the first moments, don't push but rather ask. Find out what's actually going on before deciding how to respond.`, quotes: [`"If I hear a student say 'I can't,' I don't say 'yes you can.' I ask them: 'Tell me what part of this can't you do?' It's usually because they don't know how to start, or they've gotten it wrong before and they're tired of looking embarrassed."`, `"Okay, fair enough. Tell me what's going on." — That disarms the resistance fast because they're expecting a fight and don't get one.`] },
      { bullet: `Diagnose before you respond — refusal usually comes from one of three places:`, sublist: [`Already knows it → acknowledge their knowledge and explain why practice still matters.`, `Genuinely stuck → identify the gap, offer a bridge (a prerequisite, a smaller step).`, `Unmotivated → try personalized motivation, connect to their goals.`], quotes: [] },
      { bullet: `Make the first step tiny. Getting any momentum going is more important than getting the right answer immediately.`, quotes: [`"If they say 'I don't want to,' I don't fight it. I'll ask them to do something as small as reading the question out loud."`] },
      { bullet: `Reframe the language.`, quotes: [`"You can't yet — what's the bit that's tripping you up?" Reframing 'can't' as 'not yet' usually shifts the energy within a minute.`, `"It's your choice, but if you want to achieve X, you have to at least try."`] },
      { bullet: `Try a creative reframe as a last resort. Ask the student about a past challenge they overcame in any area of life, then ask what that solution might look like here.`, quotes: [] },
    ],
    sample: [`"Tell me what part feels impossible right now — just that part."`, `"Let's just do the first step together. You don't have to do the whole thing alone."`, `"You can't do this yet. What's the piece that's tripping you up?"`],
    redflags: [`If refusal is a pattern across sessions, flag to the campus DRI as this may need a guide-level conversation.`, `If the student was booked into the call by a guide and clearly doesn't want to be there, start building communication and rapport before forcing content. If engagement doesn't come, close warmly and inform the campus DRI.`, `Student is rude or aggressive — acknowledge, de-escalate once, and if the behavior continues, end the session and flag immediately.`],
  },
  {
    id: 8, number: "8",
    title: "Ending a Session on a Metacognitive, Positive Note",
    situation: `The session is wrapping up. This final 2–3 minutes is not wasted time. On the contrary, it's where the learning consolidates. A strong close gives the student something to carry forward. The goal is for the student to leave knowing what they learned, how they learned it, and that they are capable.`,
    good: [
      { bullet: `Ask the student to name what they learned — don't name it for them. If you name it, it's your takeaway, not theirs. Wait for the student to produce the answer, even if there's an awkward pause.`, quotes: [`"What's one thing you know how to do now that you didn't when we started?"`, `"The student naming the strategy in their own words is the point — if I name it for them, it's my takeaway, not theirs."`] },
      { bullet: `Ask them to name the strategy, not just the content. Students should leave understanding how they got unstuck, not just what the answer was.`, quotes: [`"What helped you master the lesson on this coaching call that you don't typically do?"`, `"What made that click for you?"`] },
      { bullet: `Use a structured recap if open questions get vague answers.`, quotes: [`"Today we focused on [topic]. When we see a question like [X], what's the first thing we need to do? What then?" — keep prompting until you've run through the whole process together.`] },
      { bullet: `Use a confidence scale for students who resist reflective questions.`, quotes: [`"Rate your confidence 1–10 before we started. Now what would you give it?" This gives the student a concrete way to notice their own progress.`] },
      { bullet: `Narrate their growth if questions don't land. Some students don't respond well to reflection questions. Tell them what you saw instead.`, quotes: [`"I take 20–30 seconds to acknowledge their skill level at the start, what they learned specifically, and then establish their new skill level. Praise them on acquiring it — that's it."`] },
      { bullet: `End with something specific pointing forward, not a generic "great job."`, quotes: [`"Next time you see that question type, try the strategies we used today — I'm sure you'll surprise yourself."`] },
    ],
    sample: [`"What's one thing you know how to do now that you didn't when we started?"`, `"What helped you the most today — what would you do again next time?"`, `"You came in at [X]. Where would you put yourself now, 1–10?"`],
    redflags: [`If the student can't name anything they learned, the session may have been too coach-led. Adjust next time: more independent practice, earlier.`, `If the student is rushing to end, don't skip the close. Even 60 seconds matters. Make it one question, not three.`, `If student gives a generic answer like "math", probe a little more: "What about math? What's the specific thing you'd do differently next time?"`],
  },
  {
    id: 9, number: "9",
    title: "A Parent or Adult Is in the Room and Taking Over the Session",
    situation: `A parent, guide, or other adult is present during the coaching call - watching, interjecting, answering for the student, or trying to redirect the session. This was raised independently by multiple coaches as one of the hardest situations to navigate. The challenge is maintaining the student's ownership of the session without overstepping with the adult.`,
    good: [
      { bullet: `Keep the focus on the student, not the adult. Address your questions and prompts directly to the student, even if the adult is speaking.`, quotes: [] },
      { bullet: `If the adult answers for the student, pause briefly, then redirect: "That's helpful — [student name], what do you think?"`, quotes: [] },
      { bullet: `Acknowledge the adult warmly but briefly. A brief acknowledgement at the start ("Great to have you here") often satisfies the adult's need to be seen without opening the door to a longer conversation.`, quotes: [] },
      { bullet: `Stay in your lane. If an adult asks for parenting advice or curriculum explanations beyond the session, it's okay to say you're not the right person and suggest they speak with the guide.`, quotes: [`"I had one ask me for strategies on how to teach math, and stay on the call trying to get help a little longer than seemed appropriate. I wasn't sure if I was supposed to be consulting with a parent."`] },
      { bullet: `If an adult is co-coaching in a way that confuses the student, gently re-center: "Let's try it [student name]'s way first and see what happens."`, quotes: [] },
    ],
    sample: [`"Thanks for being here. [Student name], let's focus on you — what does this question look like to you?"`, `"That's a great question — I'd suggest raising that with the guide, who'll have more context than I do."`],
    redflags: [`If the adult is clearly doing the work for the student and you cannot re-direct, flag to the campus DRI after the call.`, `If the adult becomes hostile or challenges your coaching approach, stay calm, don't debate, and inform the campus DRI.`, `If the student seems uncomfortable with the adult present, note it and flag discreetly to the campus DRI.`],
  },
  {
    id: 10, number: "10",
    title: "The Student Doesn't Want Coaching — A Guide Booked the Call",
    situation: `The student arrives already resistant because they didn't choose to be here. This is fundamentally different from mid-session pushback: the resistance starts before any content is introduced.`,
    good: [
      { bullet: `Don't start with content. Start with the relationship. A student who didn't choose to be on this call needs to feel heard before they'll engage with anything academic.`, quotes: [] },
      { bullet: `Genuine "What's going on today?" or "How are you doing?" Give them a moment to just be a person.`, quotes: [] },
      { bullet: `Acknowledge the situation honestly if they bring it up. "I hear you — let's see if we can make it worth your time" is more disarming than pretending everything is normal.`, quotes: [] },
      { bullet: `Find one thing they do want to work on. Give the student some control: "Is there anything in your lessons right now that's actually been annoying you? Let's start there."`, quotes: [] },
      { bullet: `Keep the focus on what the student walks away with, not on completing the lesson. It is perfectly okay not to finish a lesson during a call. What matters is that the student leaves better equipped to work independently than when they arrived — more confident, clearer on a strategy, or simply less resistant to trying. A student who didn't want to be here and leaves feeling okay about coaching has made real progress.`, quotes: [`"Sometimes students don't want coaching, and guides are the ones who book it. Kids are still kids — the balance between the structure of the call and the real interaction is vital."`] },
    ],
    sample: [`"I know you didn't book this call yourself. Let's see if we can make it useful — is there anything in your lessons that's been bugging you?"`, `"We only have [X] minutes. What would make this worth your time?"`],
    redflags: [`Student is completely non-responsive even after a relationship-first opening — close warmly and inform the campus DRI. Don't force content.`, `This pattern repeats — notify campus DRI as the guide may need to have a different conversation with the student or family about coaching.`, `Student expresses that coaching feels like a punishment — flag to the campus DRI to clear up communication issue at the guide level.`],
  },
];

.tc-sit{font-weight:600;color:#2D2A26;}
.tc-label{display:none;}
.tr-card{background:#fff;border:1px solid #DDD5C8;border-radius:12px;padding:24px 24px 26px;margin-bottom:18px;box-shadow:0 1px 6px rgba(27,77,72,0.04);}
.tr-card-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:#1B4D48;margin-bottom:4px;}
.tr-card-sub{font-size:15px;font-style:italic;color:#5B554B;line-height:1.6;margin-bottom:18px;}
.tr-group{margin-bottom:18px;}
.tr-group:last-child{margin-bottom:0;}
.tr-group-label{font-size:12px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:#8A5E12;margin-bottom:9px;}
.tr-q{list-style:none;margin:0;padding:0;}
.tr-q li{position:relative;padding-left:18px;font-size:15.5px;line-height:1.7;color:#2D2A26;margin-bottom:7px;}
.tr-q li:last-child{margin-bottom:0;}
.tr-q li::before{content:"";position:absolute;left:3px;top:9px;width:6px;height:6px;border-radius:50%;background:#C08B2A;}
.tr-note{margin-top:6px;padding:14px 16px;background:#EBF3F2;border-radius:8px;font-size:14.5px;line-height:1.72;color:#1B4D48;}
.tr-phase{margin-bottom:18px;}
.tr-phase:last-child{margin-bottom:0;}
.tr-phase-label{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:#1B4D48;margin-bottom:10px;}
.tr-check{list-style:none;margin:0;padding:0;}
.tr-check li{position:relative;padding-left:28px;font-size:15.5px;line-height:1.7;color:#2D2A26;margin-bottom:9px;}
.tr-check li:last-child{margin-bottom:0;}
.tr-check li::before{content:"";position:absolute;left:0;top:3px;width:15px;height:15px;border:1.6px solid #C08B2A;border-radius:4px;}
@media(max-width:620px){
.tc-table{grid-template-columns:1fr;gap:1px;}
.tc-head{display:none;}
.tc-label{display:block;font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:#8A5E12;font-weight:600;margin-bottom:4px;}
.tc-sit{border-top:3px solid #1B4D48;}
}
.pb-cs{text-align:center;padding:72px 32px;}
.pb-cs-icon{width:60px;height:60px;background:#EBF3F2;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:27px;}
.pb-cs-title{font-family:'Playfair Display',serif;font-size:23px;font-weight:700;color:#1B4D48;margin-bottom:10px;}
.pb-cs-text{color:#5B554B;font-style:italic;font-size:16px;}
@media(max-width:620px){.pb-tiles{grid-template-columns:1fr;}.pb-container{padding:0 20px;}.pb-page{padding:32px 20px 60px;}.pb-nav{padding:12px 20px;}.pb-hero{padding:48px 24px 56px;}.pb-pbody-inner{padding-left:24px;}.pb-pnum{font-size:23px;width:32px;}}
`;

function NavBar({ onNavigate, breadcrumb }) {
  return (
    <nav className="pb-nav">
      <button className="pb-nav-btn" onClick={() => onNavigate("home")}>← Back</button>
      <button className="pb-nav-btn" onClick={() => onNavigate("home")}>⌂ Home</button>
      {breadcrumb && <span className="pb-crumb">/ {breadcrumb}</span>}
    </nav>
  );
}

function Block({ block }) {
  if (block.t === "p") return <p className="pb-para">{block.text}</p>;
  if (block.t === "q") return <div className="pb-quote">&ldquo;{block.text}&rdquo;</div>;
  if (block.t === "h") return <div className="pb-subh">{block.text}</div>;
  if (block.t === "note") return <p className="pb-note">{block.text}</p>;
  if (block.t === "ul") return (
    <ul className="pb-ul">{block.items.map((it, i) => <li key={i}>{it}</li>)}</ul>
  );
  return null;
}

function PrincipleTile({ principle, isExpanded, isFaded, onClick }) {
  const { number, title, tagline, blocks } = principle;
  return (
    <div className={`pb-ptile${isExpanded ? " active" : ""}${isFaded ? " faded" : ""}`} onClick={onClick}>
      <div className="pb-ph">
        <div className="pb-pnum">{number}</div>
        <div className="pb-pt">
          <div className="pb-ptitle">{title}</div>
          <div className="pb-ptag">{tagline}</div>
        </div>
        <div className="pb-chev">▼</div>
      </div>
      <div className={`pb-pbody${isExpanded ? " open" : ""}`}>
        <div className="pb-pbody-inner">
          {blocks.map((b, i) => <Block key={i} block={b} />)}
        </div>
      </div>
    </div>
  );
}

function HomePage({ onNavigate }) {
  const sections = [
    { id: "section-a", letter: "A", label: "Section A", title: "Core Principles", desc: "The five beliefs that should underpin every coaching session." },
    { id: "section-b", letter: "B", label: "Section B", title: "Scenario Plays", desc: "Tactical guidance for the situations coaches face most often." },
    { id: "section-c", letter: "C", label: "Section C", title: "Tools & Resources", desc: "Guiding-question prompts and a session-flow checklist." },
    { id: "section-d", letter: "D", label: "Section D", title: "Troubleshooting Quick Reference", desc: "A one-table summary to reach for mid-session." },
  ];
  return (
    <>
      <div className="pb-hero">
        <div className="pb-badge">June 2026</div>
        <h1 className="pb-hero-title">Academic Coaching<br />Best Practices Playbook</h1>
      </div>
      <div className="pb-container">
        <section className="pb-how-to">
          <div className="pb-eyebrow">Getting Started</div>
          <h2 className="pb-h2">How to Use This Playbook</h2>
          <p className="pb-body">This playbook has four sections:</p>
          <div className="pb-items">
            <div className="pb-item"><div className="pb-item-badge">A</div><div><strong>Section A — Core Principles</strong> sets out the five beliefs that should underpin every coaching session. Read these first.</div></div>
            <div className="pb-item"><div className="pb-item-badge">B</div><div><strong>Section B — Scenario Plays</strong> gives tactical guidance for the specific situations coaches face most often, each with exact language, real coach quotes, and red flags.</div></div>
            <div className="pb-item"><div className="pb-item-badge">C</div><div><strong>Section C — Tools &amp; Resources</strong> collects reusable aids — a bank of guiding questions and a session-flow checklist.</div></div>
            <div className="pb-item"><div className="pb-item-badge">D</div><div><strong>Section D — Troubleshooting Quick Reference</strong> is a one-table summary to reach for mid-session when you need a fast answer.</div></div>
          </div>
          <div className="pb-qnote">The quotes throughout this playbook are real sentences from coaches on this team. They are included because they work, and because the best coaching language often comes from coaches themselves, not from a manual.</div>
        </section>
        <h2 className="pb-h2 pb-sections-h">Sections</h2>
        <div className="pb-tiles">
          {sections.map(s => (
            <div key={s.id} className="pb-tile" onClick={() => onNavigate(s.id)}>
              <div className="pb-tile-letter">{s.letter}</div>
              <div className="pb-tile-label">{s.label}</div>
              <div className="pb-tile-title">{s.title}</div>
              <div className="pb-tile-desc">{s.desc}</div>
              <div className="pb-tile-arrow">→</div>
            </div>
          ))}
        </div>
      </div>
    </>
  );
}

function SectionAPage({ onNavigate, expandedId, setExpandedId }) {
  return (
    <>
      <NavBar onNavigate={onNavigate} breadcrumb="Section A — Core Principles" />
      <div className="pb-page">
        <div className="pb-eyebrow">Section A</div>
        <h2 className="pb-h2">Core Principles</h2>
        <div className="pb-page-intro">
          <p>The five principles below are not rules; they don't tell you what to do in any specific situation. They are the beliefs that underpin everything in Section B.</p>
          <p>They were identified from patterns across all survey responses. These are things coaches discovered through doing the work.</p>
          <p>Read them before your first call. Return to them when a session doesn't go the way you expected.</p>
        </div>
        <div className="pb-principles">
          {PRINCIPLES.map(p => (
            <PrincipleTile
              key={p.id}
              principle={p}
              isExpanded={expandedId === p.id}
              isFaded={expandedId !== null && expandedId !== p.id}
              onClick={() => setExpandedId(prev => prev === p.id ? null : p.id)}
            />
          ))}
        </div>
      </div>
    </>
  );
}

function ScenarioTile({ scenario, isExpanded, isFaded, onClick }) {
  const { number, title, situation, good, sample, redflags } = scenario;
  return (
    <div className={`pb-ptile${isExpanded ? " active" : ""}${isFaded ? " faded" : ""}`} onClick={onClick}>
      <div className="pb-ph">
        <div className="pb-pnum">{number}</div>
        <div className="pb-pt">
          <div className="pb-ptitle">{title}</div>
        </div>
        <div className="pb-chev">▼</div>
      </div>
      <div className={`pb-pbody${isExpanded ? " open" : ""}`}>
        <div className="pb-pbody-inner">
          <div className="sb-block">
            <div className="sb-block-label">The Situation</div>
            <p className="sb-sit">{situation}</p>
          </div>
          <div className="sb-block">
            <div className="sb-block-label">What Good Coaches Do</div>
            {good.map((g, i) => (
              <div key={i} className="sb-good-item">
                <div className="sb-bullet">{g.bullet}</div>
                {g.sublist && (
                  <ul className="sb-sublist">{g.sublist.map((s, j) => <li key={j}>{s}</li>)}</ul>
                )}
                {g.quotes.map((q, j) => <div key={j} className="sb-box">{q}</div>)}
              </div>
            ))}
          </div>
          <div className="sb-block">
            <div className="sb-block-label">Sample Language</div>
            {sample.map((s, i) => <div key={i} className="sb-box" style={{ marginTop: i === 0 ? 0 : 10 }}>{s}</div>)}
          </div>
          <div className="sb-block">
            <div className="sb-block-label">🚩 Red Flags — when to escalate or change approach</div>
            {redflags.map((r, i) => (
              <div key={i} className="sb-redflag"><span className="sb-redflag-icon">🚩</span><span>{r}</span></div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function SectionBPage({ onNavigate, expandedId, setExpandedId }) {
  return (
    <>
      <NavBar onNavigate={onNavigate} breadcrumb="Section B — Scenario Plays" />
      <div className="pb-page">
        <div className="pb-eyebrow">Section B</div>
        <h2 className="pb-h2">Scenario Plays</h2>
        <div className="pb-page-intro">
          <p>These are the ten situations coaches run into most — the moments where a session can tip one way or the other. Each one follows the same shape: what's happening, what effective coaches actually do (with language you can borrow word-for-word), and the red flags that mean it's time to escalate or change course.</p>
          <p>You won't meet them in order, and you won't need all ten in a single call. Skim them now so they feel familiar, then come back to the one you need when a session takes a turn. Tap any scenario to open it.</p>
        </div>
        <div className="pb-principles">
          {SCENARIOS.map(s => (
            <ScenarioTile
              key={s.id}
              scenario={s}
              isExpanded={expandedId === s.id}
              isFaded={expandedId !== null && expandedId !== s.id}
              onClick={() => setExpandedId(prev => prev === s.id ? null : s.id)}
            />
          ))}
        </div>
      </div>
    </>
  );
}

function SectionCPage({ onNavigate }) {
  return (
    <>
      <NavBar onNavigate={onNavigate} breadcrumb="Section C — Tools & Resources" />
      <div className="pb-page">
        <div className="pb-eyebrow">Section C</div>
        <h2 className="pb-h2">Tools &amp; Resources</h2>
        <div className="pb-page-intro">
          <p>Reusable aids you can pull up before or during a call. App-specific guides are coming soon; for now, two things that work on any app or subject.</p>
        </div>
        <div className="tr-card">
          <div className="tr-card-title">Guiding-Questions Toolkit</div>
          <div className="tr-card-sub">Content-free questions you can ask on any app, in any subject, without giving away the answer. Grouped by what you're trying to do.</div>
          {GUIDING_QUESTIONS.map((g, i) => (
            <div key={i} className="tr-group">
              <div className="tr-group-label">{g.group}</div>
              <ul className="tr-q">{g.questions.map((q, j) => <li key={j}>{q}</li>)}</ul>
            </div>
          ))}
          <div className="tr-note">The rule behind all of them: <em>"There are ALWAYS guiding questions that can be asked without revealing the answer."</em> And the self-check: <em>Am I doing cognitive work the student could do with a nudge?</em></div>
        </div>
        <div className="tr-card">
          <div className="tr-card-title">Session Flow Checklist</div>
          <div className="tr-card-sub">The shape of a strong call, start to finish.</div>
          {SESSION_FLOW.map((ph, i) => (
            <div key={i} className="tr-phase">
              <div className="tr-phase-label">{ph.phase}</div>
              <ul className="tr-check">{ph.items.map((it, j) => <li key={j}>{it}</li>)}</ul>
            </div>
          ))}
        </div>
      </div>
    </>
  );
}

function SectionDPage({ onNavigate }) {
  return (
    <>
      <NavBar onNavigate={onNavigate} breadcrumb="Section D — Troubleshooting Quick Reference" />
      <div className="pb-page">
        <div className="pb-eyebrow">Section D</div>
        <h2 className="pb-h2">Troubleshooting Quick Reference</h2>
        <div className="pb-page-intro">
          <p>Use this table mid-session when you need a fast answer. It is not a substitute for the full guidance in Sections A and B — it is a prompt to remind you of what to do first. Situations needing urgent attention are tinted; for any situation marked as escalate, log it after the call rather than waiting until next week.</p>
        </div>
        <div className="tc-table">
          <div className="tc-head">Situation</div>
          <div className="tc-head">Immediate action</div>
          <div className="tc-head">Escalate if…</div>
          {TROUBLESHOOT.map((group, gi) => (
            <Fragment key={gi}>
              <div className="tc-band">{group.cat}</div>
              {group.rows.map((r, ri) => {
                const tint = r.tint ? " " + r.tint : "";
                return (
                  <Fragment key={ri}>
                    <div className={"tc-cell tc-sit" + tint}><span className="tc-label">Situation</span>{r.sit}</div>
                    <div className={"tc-cell" + tint}><span className="tc-label">Immediate action</span>{r.action}</div>
                    <div className={"tc-cell" + tint}><span className="tc-label">Escalate if…</span>{r.escalate}</div>
                  </Fragment>
                );
              })}
            </Fragment>
          ))}
        </div>
      </div>
    </>
  );
}

function ComingSoon({ onNavigate, title, icon }) {
  return (
    <>
      <NavBar onNavigate={onNavigate} breadcrumb={title} />
      <div className="pb-page">
        <div className="pb-cs">
          <div className="pb-cs-icon">{icon}</div>
          <div className="pb-cs-title">{title}</div>
          <div className="pb-cs-text">This section is next up — we'll build it together.</div>
        </div>
      </div>
    </>
  );
}

function App() {
  const [page, setPage] = useState("home");
  const [expandedId, setExpandedId] = useState(null);
  const [expandedScenario, setExpandedScenario] = useState(null);

  const navigate = (target) => {
    setPage(target);
    if (target !== "section-a") setExpandedId(null);
    if (target !== "section-b") setExpandedScenario(null);
    try { window.scrollTo(0, 0); } catch (e) {}
  };

  return (
    <div className="pb-app">
      <style>{CSS}</style>
      {page === "home" && <HomePage onNavigate={navigate} />}
      {page === "section-a" && <SectionAPage onNavigate={navigate} expandedId={expandedId} setExpandedId={setExpandedId} />}
      {page === "section-b" && <SectionBPage onNavigate={navigate} expandedId={expandedScenario} setExpandedId={setExpandedScenario} />}
      {page === "section-c" && <SectionCPage onNavigate={navigate} />}
      {page === "section-d" && <SectionDPage onNavigate={navigate} />}
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
